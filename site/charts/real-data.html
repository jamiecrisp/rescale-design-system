<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Re:Scale — Real Data Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shell.css">
    <style>
    </style>
    <script>if(localStorage.getItem("theme")==="light")document.documentElement.removeAttribute("data-theme");</script>
</head>
<body>
    <button class="nav__toggle" id="nav-toggle" aria-label="Toggle navigation">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="nav__overlay" id="nav-overlay"></div>

    <div class="shell">
        <nav class="nav" id="nav">
            <a href="../../index.html" class="nav__brand">
                <div class="nav__brand-icon">⚡</div>
                <div class="nav__brand-text">Re:<span>Scale</span></div>
            </a>
            <div class="nav__scroll">
        <div class="nav__group">
            <div class="nav__group-title">Charts</div>
            <a class="nav__link" href="../charts/components.html">Components</a>
            <a class="nav__link nav__link--active" href="../charts/real-data.html">Real Data</a>
        </div></div>
            <div class="nav__footer">
                <button class="nav__theme-toggle" id="theme-btn">☀️ Light mode</button>
            </div>
        </nav>

        <main class="main">
            <div class="main__header">
                <div class="main__breadcrumb"><a href="../../index.html">Re:Scale</a><span class="sep">›</span>Charts<span class="sep">›</span>Real Data Demo</div>
                <h1 class="main__title">Real Data Demo</h1>
                <p class="main__desc">415 days of real weight data visualised across 8 chart views.</p>
            </div>
            <div class="section">
                <p style="margin-bottom: var(--space-4);"><a href="../../design-system/charts/chart-realdata.html" style="color: var(--accent);">Open full-screen →</a></p>
                <iframe src="../../design-system/charts/chart-realdata.html" style="width:100%; height:800px; border:1px solid var(--border-decorative); border-radius: var(--radius-lg); background: var(--bg-page);" loading="lazy"></iframe>
            </div>
        </main>
    </div>

    <script>
        // Theme toggle
        document.getElementById('theme-btn').addEventListener('click', function() {
            const html = document.documentElement;
            if (html.getAttribute('data-theme') === 'dark') {
                html.removeAttribute('data-theme');
                this.textContent = '🌙 Dark mode';
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                this.textContent = '☀️ Light mode';
                localStorage.setItem('theme', 'dark');
            }
        });
        if (localStorage.getItem('theme') === 'light') {
            document.getElementById('theme-btn').textContent = '🌙 Dark mode';
        }
        // Mobile nav
        const toggle = document.getElementById('nav-toggle');
        const nav = document.getElementById('nav');
        const overlay = document.getElementById('nav-overlay');
        toggle.addEventListener('click', () => { nav.classList.toggle('is-open'); overlay.classList.toggle('is-open'); });
        overlay.addEventListener('click', () => { nav.classList.remove('is-open'); overlay.classList.remove('is-open'); });
    </script>
</body>
</html>
