<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Re:Scale — Select</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../dist/rescale.css">
    <style>
        .example { max-width: 800px; margin: 0 auto; padding: 48px 24px; }
        .example h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
        .example p.desc { font-size: 0.875rem; color: var(--rs-text-secondary); margin-bottom: 32px; }
        .example section { margin-bottom: 40px; }
        .example h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--rs-text-tertiary); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--rs-border-decorative); }
        .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
        .col { display: flex; flex-direction: column; gap: 12px; flex: 1; min-width: 260px; }
    </style>
</head>
<body>
    <div class="example">
        <h1>Select</h1>
        <p class="desc">Re:Scale Design System — <code>.rs-select</code></p>

        <section>
            <h2>Default</h2>
            <p style="background: var(--rs-color-warning-dim); border-radius: 10px; padding: 12px 16px; margin-bottom: 24px; font-size: 0.875rem; color: var(--rs-color-warning);">
                <strong>⚠ Use sparingly.</strong> Prefer radio buttons for ≤5 options. Reserve &lt;select&gt; for long lists (countries, timezones).
            </p>
            <div class="rs-field" style="max-width:300px;">
                <label class="rs-field__label" for="s1">Timezone</label>
                <select class="rs-input rs-select" id="s1">
                    <option>Europe/London</option>
                    <option>America/New_York</option>
                    <option>America/Los_Angeles</option>
                    <option>Asia/Tokyo</option>
                    <option>Australia/Sydney</option>
                </select>
            </div>
        </section>
    </div>
</body>
</html>
