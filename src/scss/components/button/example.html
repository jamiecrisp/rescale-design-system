<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Re:Scale — Button</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../dist/rescale.css">
    <style>
        .example { max-width: 800px; margin: 0 auto; padding: 48px 24px; }
        .example h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
        .example p.desc { font-size: 0.875rem; color: var(--rs-text-secondary); margin-bottom: 32px; }
        .example section { margin-bottom: 40px; }
        .example h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--rs-text-tertiary); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--rs-border-decorative); }
        .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
        .col { display: flex; flex-direction: column; gap: 12px; flex: 1; min-width: 260px; }
    </style>
</head>
<body>
    <div class="example">
        <h1>Button</h1>
        <p class="desc">Re:Scale Design System — <code>.rs-button</code></p>

        <section>
            <h2>Variants</h2>
            <div class="row">
                <button class="rs-btn rs-btn--primary">Primary</button>
                <button class="rs-btn rs-btn--secondary">Secondary</button>
                <button class="rs-btn rs-btn--ghost">Ghost</button>
                <button class="rs-btn rs-btn--danger">Danger</button>
                <button class="rs-btn rs-btn--primary" disabled>Disabled</button>
            </div>
        </section>
        <section>
            <h2>Sizes</h2>
            <div class="row">
                <button class="rs-btn rs-btn--primary rs-btn--sm">Small</button>
                <button class="rs-btn rs-btn--primary">Default</button>
                <button class="rs-btn rs-btn--primary rs-btn--lg">Large</button>
            </div>
        </section>
        <section>
            <h2>With Icon</h2>
            <div class="row">
                <button class="rs-btn rs-btn--primary">
                    <svg class="rs-btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add entry
                </button>
            </div>
        </section>
        <section>
            <h2>Full Width</h2>
            <button class="rs-btn rs-btn--primary rs-btn--block">Save changes</button>
        </section>
    </div>
</body>
</html>
