<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Re:Scale — Empty State</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../dist/rescale.css">
    <style>
        .example { max-width: 800px; margin: 0 auto; padding: 48px 24px; }
        .example h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
        .example p.desc { font-size: 0.875rem; color: var(--rs-text-secondary); margin-bottom: 32px; }
    </style>
</head>
<body>
    <div class="example">
        <h1>Empty State</h1>
        <p class="desc">Re:Scale Design System — <code>.rs-empty</code></p>
        <div style="background: var(--rs-bg-glass); border: 1px solid var(--rs-border-decorative); border-radius: 16px;">
            <div class="rs-empty">
                <svg class="rs-empty__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                <h3 class="rs-empty__title">No entries yet</h3>
                <p class="rs-empty__desc">Log your first weigh-in to start tracking your progress.</p>
                <button class="rs-btn rs-btn--primary">
                    <svg class="rs-btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add entry
                </button>
            </div>
        </div>
    </div>
</body>
</html>
