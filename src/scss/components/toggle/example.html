<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Re:Scale — Toggle Switch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../dist/rescale.css">
    <style>
        .example { max-width: 800px; margin: 0 auto; padding: 48px 24px; }
        .example h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
        .example p.desc { font-size: 0.875rem; color: var(--rs-text-secondary); margin-bottom: 32px; }
        .example section { margin-bottom: 40px; }
        .example h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--rs-text-tertiary); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--rs-border-decorative); }
    </style>
</head>
<body>
    <div class="example">
        <h1>Toggle Switch</h1>
        <p class="desc">Re:Scale Design System — <code>.rs-toggle</code></p>
        <section>
            <h2>Default</h2>
            <label class="rs-toggle">
                <input type="checkbox" class="rs-toggle__input" checked>
                <span class="rs-toggle__track"></span>
                <span class="rs-toggle__label">Google Fit sync</span>
            </label>
            <label class="rs-toggle">
                <input type="checkbox" class="rs-toggle__input">
                <span class="rs-toggle__track"></span>
                <span class="rs-toggle__label">Dark mode</span>
            </label>
            <label class="rs-toggle">
                <input type="checkbox" class="rs-toggle__input" checked>
                <span class="rs-toggle__track"></span>
                <span class="rs-toggle__label">Daily reminder</span>
            </label>
        </section>
    </div>
</body>
</html>
