<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Re:Scale — Radio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../dist/rescale.css">
    <style>
        .example { max-width: 800px; margin: 0 auto; padding: 48px 24px; }
        .example h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
        .example p.desc { font-size: 0.875rem; color: var(--rs-text-secondary); margin-bottom: 32px; }
        .example section { margin-bottom: 40px; }
        .example h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--rs-text-tertiary); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--rs-border-decorative); }
        .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
        .col { display: flex; flex-direction: column; gap: 12px; flex: 1; min-width: 260px; }
    </style>
</head>
<body>
    <div class="example">
        <h1>Radio</h1>
        <p class="desc">Re:Scale Design System — <code>.rs-radio</code></p>

        <section>
            <h2>Horizontal Group</h2>
            <fieldset style="border:none;">
                <legend class="rs-field__label" style="margin-bottom:8px;">Weight unit</legend>
                <div class="rs-radio-group">
                    <label class="rs-radio"><input type="radio" name="unit" class="rs-radio__input" checked><span class="rs-radio__label">kg</span></label>
                    <label class="rs-radio"><input type="radio" name="unit" class="rs-radio__input"><span class="rs-radio__label">lbs</span></label>
                    <label class="rs-radio"><input type="radio" name="unit" class="rs-radio__input"><span class="rs-radio__label">st &amp; lbs</span></label>
                </div>
            </fieldset>
        </section>
        <section>
            <h2>Vertical Group</h2>
            <fieldset style="border:none;">
                <legend class="rs-field__label" style="margin-bottom:8px;">Chart time range</legend>
                <div class="rs-radio-group--vertical">
                    <label class="rs-radio"><input type="radio" name="range" class="rs-radio__input" checked><span class="rs-radio__label">Last 7 days</span></label>
                    <label class="rs-radio"><input type="radio" name="range" class="rs-radio__input"><span class="rs-radio__label">Last 30 days</span></label>
                    <label class="rs-radio"><input type="radio" name="range" class="rs-radio__input"><span class="rs-radio__label">Last 3 months</span></label>
                    <label class="rs-radio"><input type="radio" name="range" class="rs-radio__input"><span class="rs-radio__label">Last year</span></label>
                </div>
            </fieldset>
        </section>
    </div>
</body>
</html>
