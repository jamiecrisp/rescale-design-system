<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Re:Scale — Toast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../dist/rescale.css">
    <style>
        .example { max-width: 800px; margin: 0 auto; padding: 48px 24px; }
        .example h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
        .example p.desc { font-size: 0.875rem; color: var(--rs-text-secondary); margin-bottom: 32px; }
        .example section { margin-bottom: 40px; }
        .example h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--rs-text-tertiary); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--rs-border-decorative); }
        .stack { display: flex; flex-direction: column; gap: 16px; align-items: flex-start; }
    </style>
</head>
<body>
    <div class="example">
        <h1>Toast Notification</h1>
        <p class="desc">Re:Scale Design System — <code>.rs-toast</code>. Use <code>aria-live="polite"</code> on the container.</p>
        <section>
            <h2>Default</h2>
            <div class="stack" aria-live="polite">
                <div class="rs-toast">
                    <svg class="rs-toast__icon" viewBox="0 0 24 24" fill="none" stroke="var(--rs-color-success)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/></svg>
                    Entry saved — 82.4 kg
                </div>
                <div class="rs-toast">
                    <svg class="rs-toast__icon" viewBox="0 0 24 24" fill="none" stroke="var(--rs-color-info)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/></svg>
                    Synced with Google Fit
                </div>
            </div>
        </section>
    </div>
</body>
</html>
